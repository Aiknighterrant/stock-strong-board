name: Test Stock Strong Board Skill

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test skill structure
      run: |
        echo "Checking skill structure..."
        ls -la
        ls -la scripts/
        ls -la references/
        
        # Check required files exist
        [ -f SKILL.md ] && echo "✓ SKILL.md exists" || exit 1
        [ -f README.md ] && echo "✓ README.md exists" || exit 1
        [ -f requirements.txt ] && echo "✓ requirements.txt exists" || exit 1
        [ -f setup.py ] && echo "✓ setup.py exists" || exit 1
        [ -f LICENSE ] && echo "✓ LICENSE exists" || exit 1
    
    - name: Test Python scripts
      run: |
        echo "Testing Python scripts..."
        python scripts/main.py --help
        python scripts/main.py --date today --test --output json --limit 3
        
        # Test individual modules
        python -c "import scripts.utils; print('✓ utils module imports successfully')"
        python -c "import scripts.fetch_stock_data; print('✓ fetch_stock_data module imports successfully')"
        python -c "import scripts.filter_stocks; print('✓ filter_stocks module imports successfully')"
        python -c "import scripts.analyze_sectors; print('✓ analyze_sectors module imports successfully')"
    
    - name: Run basic tests
      run: |
        echo "Running basic functionality tests..."
        
        # Test 1: Help command
        python scripts/main.py --help > /dev/null && echo "✓ Help command works"
        
        # Test 2: Test mode with table output
        python scripts/main.py --date today --test --output table --limit 5 > /dev/null && echo "✓ Test mode with table output works"
        
        # Test 3: Test mode with JSON output
        python scripts/main.py --date today --test --output json --limit 3 > /dev/null && echo "✓ Test mode with JSON output works"
        
        # Test 4: Test mode with CSV output
        python scripts/main.py --date today --test --output csv --limit 2 > /dev/null && echo "✓ Test mode with CSV output works"
        
        # Test 5: Test with different parameters
        python scripts/main.py --date today --test --min_amount 2 --min_turnover 12 --max_turnover 18 > /dev/null && echo "✓ Custom parameters work"
    
    - name: Validate skill
      run: |
        echo "Validating skill structure..."
        # Check if skill has proper description in SKILL.md
        if grep -q "description:" SKILL.md; then
          echo "✓ SKILL.md has description field"
        else
          echo "✗ SKILL.md missing description field"
          exit 1
        fi
        
        if grep -q "name:" SKILL.md; then
          echo "✓ SKILL.md has name field"
        else
          echo "✗ SKILL.md missing name field"
          exit 1
        fi
    
    - name: Check code style
      run: |
        echo "Checking Python code style..."
        # Install flake8 if not present
        pip install flake8
        
        # Run flake8 on scripts directory
        flake8 scripts/ --max-line-length=120 --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 scripts/ --max-line-length=120 --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    
    - name: Create package
      run: |
        echo "Testing package creation..."
        python setup.py sdist bdist_wheel
        ls -la dist/
        
        # Test installation
        pip install dist/*.whle 2>/dev/null || pip install dist/*.tar.gz
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          dist/
          *.log
        retention-days: 1