name: Validate Skill Structure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check required files
      run: |
        echo "Checking skill structure..."
        
        # 检查必需文件
        required_files=(
          "SKILL.md"
          "scripts/main.py"
          "scripts/fetch_stock_data.py"
          "scripts/filter_stocks.py"
          "scripts/analyze_sectors.py"
          "scripts/utils.py"
          "requirements.txt"
        )
        
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done
        
        echo ""
        echo "✅ Skill structure validation passed!"
    
    - name: Check SKILL.md format
      run: |
        echo "Checking SKILL.md frontmatter..."
        
        if head -20 SKILL.md | grep -q "---"; then
          echo "✓ Frontmatter detected"
        else
          echo "✗ No frontmatter found"
          exit 1
        fi
        
        if head -20 SKILL.md | grep -q "name:"; then
          echo "✓ Name field found"
        else
          echo "✗ Name field missing"
          exit 1
        fi
        
        if head -20 SKILL.md | grep -q "description:"; then
          echo "✓ Description field found"
        else
          echo "✗ Description field missing"
          exit 1
        fi
    
    - name: Test main script
      run: |
        echo "Testing main script..."
        python scripts/main.py --help
        echo "✓ Main script runs successfully"
    
    - name: List all files
      run: |
        echo "Skill contents:"
        find . -type f | sort | grep -v ".git/"